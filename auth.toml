# ─── Keys ────────────────────────────────────────────────────────────────────
# backend_ref:
#   software    → filename stem under key_dir  (e.g. "svc-ec" → svc-ec.pem)
#   hsm_cluster → CKA_LABEL of the key on the HSM token

[[keys]]
id          = "svc-signing-ec"
description = "Primary EC P-256 service signing key"
backend_ref = "svc-signing-ec"
algorithm   = "ES256"
enabled     = true

[[keys]]
id          = "svc-signing-rsa"
description = "RSA-2048 signing key (legacy consumers)"
backend_ref = "svc-signing-rsa"
algorithm   = "RS256"
enabled     = true

[[keys]]
id          = "jwt-hmac"
description = "HMAC-SHA256 for internal JWT tokens"
backend_ref = "jwt-hmac"
algorithm   = "HS256"
enabled     = true


# ─── Auth ────────────────────────────────────────────────────────────────────
# Static bearer tokens → caller_id.
# Production recommendation: use mTLS (each service has a client cert) or
# IRSA (IAM Roles for Service Accounts on EKS) instead.
[auth]
allow_all = false    # true only for local dev
# CIDRs / IPs of trusted reverse proxies (AWS ALB, nginx, etc.).
# When the direct TCP peer matches one of these, the real client IP is read
# from X-Forwarded-For instead. Falls back to the raw peer IP if header absent.
trusted_proxies = ["127.0.0.1"]

[auth.tokens]
"tok-service-a-xxxxxxxx" = "service-a"
"tok-service-b-xxxxxxxx" = "service-b"
"tok-service-c-xxxxxxxx" = "service-c"

# Per-caller key allowlist.
# List the key IDs each caller is permitted to use.
# Callers with no entry here may use any key.
[auth.allowed_keys]
"service-a" = ["svc-signing-ec", "svc-signing-rsa"]
"service-b" = ["svc-signing-rsa"]
"service-c" = ["jwt-hmac"]

# Per-caller IP allowlist.
# Accepts exact IPs or CIDR ranges (IPv4 and IPv6).
# Callers with no entry here may connect from any IP.
[auth.allowed_ips]
"service-a" = ["10.0.1.0/24", "192.168.10.5", "127.0.0.1"]
"service-b" = ["10.0.2.0/24"]
"service-c" = ["10.0.3.0/24"]
