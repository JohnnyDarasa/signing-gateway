# ─────────────────────────────────────────────────────────────────────────────
# Signing Gateway — config.toml
# All values can be overridden with env vars using prefix SGW__
# Example: SGW__SERVER__HTTP_ADDR=0.0.0.0:9080
# ─────────────────────────────────────────────────────────────────────────────

[server]
http_addr             = "0.0.0.0:8080"
grpc_addr             = "0.0.0.0:50051"
shutdown_timeout_secs = 30

# TLS for gRPC (recommended in production)
# [server.tls]
# cert_pem_path = "/etc/certs/tls.crt"
# key_pem_path  = "/etc/certs/tls.key"
# ca_pem_path   = "/etc/certs/ca.crt"    ← for mTLS client verification


# ─── HSM Backend ─────────────────────────────────────────────────────────────
# Choose ONE block: software (dev) or hsm_cluster (production).

# ── Option A: Software HSM — DEV / TEST only ─────────────────────────────────
[hsm]
backend = "software"
key_dir = "/tmp/signing-gateway-keys"   # chmod 700, owned by service user

# ── Option B: PKCS#11 HSM Cluster — PRODUCTION ───────────────────────────────
# Supports: Thales Luna SA/Network HSM, Entrust nShield Connect,
#           AWS CloudHSM (PKCS#11 client), SoftHSM2 (CI)
#
# [hsm]
# backend      = "hsm_cluster"
#
# # Path to the vendor-supplied PKCS#11 shared library:
# library_path = "/usr/lib/libCryptoki2_64.so"          # Thales Luna SA
# # library_path = "/opt/nfast/toolkits/pkcs11/libcknfast.so"  # Entrust nShield
# # library_path = "/opt/cloudhsm/lib/libcloudhsm_pkcs11.so"   # AWS CloudHSM
# # library_path = "/usr/lib/softhsm/libsofthsm2.so"           # SoftHSM2
#
# # HA virtual slot: Luna HA presents a single slot that load-balances across
# # all HSM nodes in the cluster. Use that slot ID here.
# slot_id      = 0
#
# # PIN — in production load from AWS Secrets Manager / Vault:
# #   pin = "${SECRET_MANAGER:signing-gateway/hsm-pin}"
# pin          = "changeme"
#
# # Session pool — how many concurrent PKCS#11 sessions to keep open.
# # Thales Luna allows up to 256 sessions per partition.
# pool_size    = 16
#
# # Retry on transient HSM errors (e.g. momentary cluster failover)
# retry_attempts  = 3
# retry_delay_ms  = 200
#
# login_mode   = "user"    # "user" for signing | "so" for key management


# ─── Keys & Auth ─────────────────────────────────────────────────────────────
# Defined in keys.toml


# ─── Observability ───────────────────────────────────────────────────────────
[observability]
log_format   = "json"         # "pretty" | "json"
log_level    = "info"         # RUST_LOG syntax: "debug,hyper=warn"
metrics_addr = "0.0.0.0:9090" # Prometheus scrape endpoint
